# ══════════════════════════════════════════════════════════════════════════════
# deploy/kubernetes/jeiguard-ai-deployment.yaml
# JeiGuard AI — Manifiestos Kubernetes para Producción
# ══════════════════════════════════════════════════════════════════════════════
# Incluye: Namespace, ConfigMap, Secrets, Deployments, Services,
#          HorizontalPodAutoscaler y NetworkPolicy.
#
# Requisitos:
#   - Kubernetes 1.28+
#   - kubectl configurado con acceso al cluster
#   - Kafka y Elasticsearch desplegados (via Helm recomendado)
#
# Despliegue:
#   kubectl apply -f jeiguard-ai-deployment.yaml
#   kubectl -n jeiguard-ai get pods -w
# ══════════════════════════════════════════════════════════════════════════════

# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: jeiguard-ai
  labels:
    app.kubernetes.io/name:       jeiguard-ai
    app.kubernetes.io/version:    "1.0.0"
    app.kubernetes.io/managed-by: kubectl

---
# ── ConfigMap: configuración global ──────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: jeiguard-ai-config
  namespace: jeiguard-ai
data:
  KAFKA_BOOTSTRAP:        "kafka.kafka.svc.cluster.local:9092"
  ES_BOOTSTRAP:           "http://elasticsearch.elastic.svc.cluster.local:9200"
  PRODUCER_MODE:          "live"
  FLOWS_PER_SECOND:       "5000"
  INFERENCE_BATCH_SIZE:   "64"
  LOG_LEVEL:              "INFO"
  MODEL_VERSION:          "1.0.0"

---
# ── Secret: credenciales ──────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: jeiguard-ai-secrets
  namespace: jeiguard-ai
type: Opaque
stringData:
  ES_USERNAME:       "elastic"
  ES_PASSWORD:       "CHANGE_ME_IN_PRODUCTION"
  WEBHOOK_URL:       ""
  KAFKA_SASL_USER:   ""
  KAFKA_SASL_PASS:   ""

---
# ── PersistentVolumeClaim: modelos ML ────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jeiguard-ai-models-pvc
  namespace: jeiguard-ai
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
# ════════════════════════════════════════════════════════════════════════════
# DEPLOYMENT: Producer Service
# ════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ids-producer
  namespace: jeiguard-ai
  labels:
    app:                          ids-producer
    app.kubernetes.io/component:  producer
    app.kubernetes.io/version:    "1.0.0"
spec:
  replicas: 2   # Múltiples sensores en paralelo
  selector:
    matchLabels:
      app: ids-producer
  template:
    metadata:
      labels:
        app: ids-producer
    spec:
      serviceAccountName: jeiguard-ai-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: producer
          image: jeiguard-ai/producer:1.0.0
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: jeiguard-ai-config
          env:
            - name: SENSOR_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name   # Usar nombre del pod como sensor ID
            - name: DRY_RUN
              value: "false"
          resources:
            requests:
              cpu:    "250m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["python", "-c", "import os; exit(0 if os.path.exists('/tmp/producer.alive') else 1)"]
            initialDelaySeconds: 30
            periodSeconds:       15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true

---
# ════════════════════════════════════════════════════════════════════════════
# DEPLOYMENT: Preprocessor Service
# ════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ids-preprocessor
  namespace: jeiguard-ai
  labels:
    app:                          ids-preprocessor
    app.kubernetes.io/component:  preprocessor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ids-preprocessor
  template:
    metadata:
      labels:
        app: ids-preprocessor
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: preprocessor
          image: jeiguard-ai/preprocessor:1.0.0
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: jeiguard-ai-config
          env:
            - name: SCALER_PATH
              value: "/app/models/scaler.joblib"
            - name: DRY_RUN
              value: "false"
          volumeMounts:
            - name: models-volume
              mountPath: /app/models
              readOnly: true
          resources:
            requests:
              cpu:    "500m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["python", "-c", "print('alive')"]
            initialDelaySeconds: 20
            periodSeconds:       30
      volumes:
        - name: models-volume
          persistentVolumeClaim:
            claimName: jeiguard-ai-models-pvc

---
# HPA: Preprocessor — escala según CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ids-preprocessor-hpa
  namespace: jeiguard-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ids-preprocessor
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# ════════════════════════════════════════════════════════════════════════════
# DEPLOYMENT: Inference Service
# ════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ids-inference
  namespace: jeiguard-ai
  labels:
    app:                          ids-inference
    app.kubernetes.io/component:  inference
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ids-inference
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge:       1
  template:
    metadata:
      labels:
        app: ids-inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8080"
        prometheus.io/path:   "/api/v1/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: inference
          image: jeiguard-ai/inference:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: jeiguard-ai-config
          env:
            - name: MODEL_PATH
              value: "/app/models/"
            - name: DRY_RUN
              value: "false"
          volumeMounts:
            - name: models-volume
              mountPath: /app/models
              readOnly: true
          resources:
            requests:
              cpu:    "1000m"
              memory: "1Gi"
            limits:
              cpu:    "2000m"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds:       10
            failureThreshold:    3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds:       20
            failureThreshold:    3
      volumes:
        - name: models-volume
          persistentVolumeClaim:
            claimName: jeiguard-ai-models-pvc

---
# Service: Inference (ClusterIP interno + LoadBalancer externo)
apiVersion: v1
kind: Service
metadata:
  name: ids-inference-svc
  namespace: jeiguard-ai
  labels:
    app: ids-inference
spec:
  type: ClusterIP
  selector:
    app: ids-inference
  ports:
    - name:       http
      port:       80
      targetPort: 8080
      protocol:   TCP

---
# HPA: Inference — escala según CPU y RPS
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ids-inference-hpa
  namespace: jeiguard-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ids-inference
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70

---
# ════════════════════════════════════════════════════════════════════════════
# DEPLOYMENT: Alert Manager Service
# ════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ids-alert-manager
  namespace: jeiguard-ai
  labels:
    app:                          ids-alert-manager
    app.kubernetes.io/component:  alert-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ids-alert-manager
  template:
    metadata:
      labels:
        app: ids-alert-manager
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: alert-manager
          image: jeiguard-ai/alert-manager:1.0.0
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: jeiguard-ai-config
          env:
            - name: ES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jeiguard-ai-secrets
                  key:  ES_USERNAME
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jeiguard-ai-secrets
                  key:  ES_PASSWORD
            - name: ALERT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: jeiguard-ai-secrets
                  key:  WEBHOOK_URL
            - name: DRY_RUN
              value: "false"
          resources:
            requests:
              cpu:    "250m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "256Mi"

---
# ════════════════════════════════════════════════════════════════════════════
# NETWORK POLICY: Solo tráfico autorizado entre servicios
# ════════════════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jeiguard-ai-netpol
  namespace: jeiguard-ai
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: jeiguard-ai
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: jeiguard-ai
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: jeiguard-ai
    - ports:
        - port: 9092  # Kafka
          protocol: TCP
        - port: 9200  # Elasticsearch
          protocol: TCP
        - port: 443   # Webhooks HTTPS
          protocol: TCP

---
# ── ServiceAccount con mínimos privilegios ────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jeiguard-ai-sa
  namespace: jeiguard-ai
automountServiceAccountToken: false
