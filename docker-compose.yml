# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — JeiGuard AI v2.0.0 (Infraestructura Completa)
# Kafka · Elasticsearch · Kibana · Grafana · PostgreSQL · Redis · MLflow · Jaeger
# ══════════════════════════════════════════════════════════════════════════════

networks:
  ids_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  kafka_data:
  zookeeper_data:
  elasticsearch_data:
  grafana_data:
  postgres_data:
  redis_data:
  mlflow_data:
  jaeger_data:

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ids-zookeeper
    hostname: zookeeper
    networks: [ids_network]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ids-kafka
    hostname: kafka
    networks: [ids_network]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ids-kafka-setup
    networks: [ids_network]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic jeiguard.raw.flows --partitions 4 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic jeiguard.processed.features --partitions 4 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic jeiguard.predictions --partitions 2 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic jeiguard.alerts --partitions 2 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic jeiguard.dead.letter --partitions 1 --replication-factor 1
      echo 'Topics JeiGuard AI creados.'
      "

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ids-elasticsearch
    hostname: elasticsearch
    networks: [ids_network]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q green || grep -q yellow"]
      interval: 20s
      timeout: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: ids-kibana
    hostname: kibana
    networks: [ids_network]
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    ports:
      - "5601:5601"

  grafana:
    image: grafana/grafana:10.2.0
    container_name: ids-grafana
    hostname: grafana
    networks: [ids_network]
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: jeiguard2026
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"

  # ── PostgreSQL — Base de datos relacional principal ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ids-postgres
    hostname: postgres
    networks: [ids_network]
    environment:
      POSTGRES_DB:       jeiguard_ai
      POSTGRES_USER:     jeiguard
      POSTGRES_PASSWORD: jeiguard2026
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeiguard -d jeiguard_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis — Cache de sesiones, rate limiting, CVE cache ─────────────────
  redis:
    image: redis:7.2-alpine
    container_name: ids-redis
    hostname: redis
    networks: [ids_network]
    command: >
      redis-server
      --requirepass jeiguard2026
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "jeiguard2026", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MLflow — Model Registry y Experiment Tracking ───────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: ids-mlflow
    hostname: mlflow
    networks: [ids_network]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://jeiguard:jeiguard2026@postgres:5432/jeiguard_ai
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow/artifacts
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri postgresql://jeiguard:jeiguard2026@postgres:5432/jeiguard_ai
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000

  # ── Jaeger — Distributed Tracing (OpenTelemetry) ─────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: ids-jaeger
    hostname: jaeger
    networks: [ids_network]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE:      memory
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "6831:6831/udp" # Jaeger agent Thrift UDP
    volumes:
      - jaeger_data:/badger
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:14269/"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── pgAdmin — Administración visual de PostgreSQL ────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8.2
    container_name: ids-pgadmin
    hostname: pgadmin
    networks: [ids_network]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@jeiguard.ai
      PGADMIN_DEFAULT_PASSWORD: jeiguard2026
      PGADMIN_LISTEN_PORT:      5050
    ports:
      - "5050:5050"

  # ── JeiGuard AI API — FastAPI principal ──────────────────────────────────
  api:
    build: .
    container_name: ids-api
    hostname: api
    networks: [ids_network]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL:               postgresql+asyncpg://jeiguard:jeiguard2026@postgres:5432/jeiguard_ai
      REDIS_URL:                  redis://:jeiguard2026@redis:6379/0
      JWT_SECRET_KEY:             jeiguard-secret-key-2026-enterprise-256bits
      JWT_ALGORITHM:              HS256
      KAFKA_BOOTSTRAP_SERVERS:    kafka:29092
      MLFLOW_TRACKING_URI:        http://mlflow:5000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME:          jeiguard-ai
      REPORTS_DIR:                /app/reports
      PYTHONUNBUFFERED:           "1"
    ports:
      - "8080:8080"
    volumes:
      - ./reports:/app/reports
    restart: unless-stopped
