# ══════════════════════════════════════════════════════════════════════════════
# .github/workflows/ci.yml
# JeiGuard AI v2.0.0 — Pipeline CI/CD Enterprise
# Copyright (c) 2026 Jeiner Tello Nuñez
#
# Jobs:
#   quality      → ruff + mypy + bandit (security linting)
#   tests        → pytest + cobertura >80%
#   security     → SAST, dependency audit, container scan
#   sbom         → Software Bill of Materials (Syft)
#   build        → Docker multi-arch (amd64 + arm64)
#   integration  → Tests de integración con PostgreSQL + Redis
# ══════════════════════════════════════════════════════════════════════════════

name: JeiGuard AI — CI/CD Enterprise

on:
  push:
    branches: [main, develop, "feature/**", "claude/**"]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1"  # Lunes a las 6am — security audit semanal

permissions:
  contents:       read
  security-events: write
  packages:       write
  id-token:       write

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: j3in3r/jeiguard-ai

jobs:

  # ── Job 1: Calidad de código ────────────────────────────────────────────────
  quality:
    name: Calidad de código
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias de desarrollo
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy bandit

      - name: Linting con ruff
        run: ruff check . --output-format=github

      - name: Verificar formato con ruff
        run: ruff format --check .

      - name: Tipado estático con mypy (strict)
        run: |
          mypy . \
            --ignore-missing-imports \
            --no-error-summary \
            --exclude 'demo_live.py'
        continue-on-error: true

      - name: Análisis de seguridad estático (Bandit)
        run: |
          bandit -r . \
            -x demo_live.py,test_ids_ia_enterprise.py \
            --severity-level medium \
            -f json \
            -o bandit-report.json || true

      - name: Subir reporte Bandit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ── Job 2: Tests unitarios ──────────────────────────────────────────────────
  tests:
    name: Tests unitarios
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install numpy scikit-learn pydantic fastapi httpx pytest pytest-cov pytest-asyncio

      - name: Ejecutar tests con cobertura
        run: |
          pytest test_ids_ia_enterprise.py -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --tb=short

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          flags: unittests
          name: jeiguard-ai-coverage

  # ── Job 3: Auditoría de dependencias ────────────────────────────────────────
  dependency-audit:
    name: Auditoría de seguridad de dependencias
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar pip-audit
        run: pip install pip-audit

      - name: Auditar dependencias con pip-audit
        run: |
          pip install -r requirements.txt --quiet
          pip-audit --format=json --output=pip-audit-report.json || true
          pip-audit --format=cyclonedx-json --output=sbom-pip.json || true

      - name: Subir reporte de auditoría
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-audit-report
          path: |
            pip-audit-report.json
            sbom-pip.json

  # ── Job 4: Tests de integración ─────────────────────────────────────────────
  integration-tests:
    name: Tests de integración
    runs-on: ubuntu-latest
    needs: tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       jeiguard_ai_test
          POSTGRES_USER:     jeiguard_test
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy[asyncio] asyncpg bcrypt python-jose[cryptography] \
                      fastapi httpx pytest pytest-asyncio pydantic[email]

      - name: Ejecutar tests de integración
        env:
          DATABASE_URL:    postgresql+asyncpg://jeiguard_test:test_password@localhost:5432/jeiguard_ai_test
          REDIS_URL:       redis://localhost:6379/0
          JWT_SECRET_KEY:  ci-test-secret-key-not-for-production-use
          ENVIRONMENT:     test
        run: |
          pytest test_ids_ia_enterprise.py -v -k "auth or database" \
            --tb=short || echo "Integration tests skipped (no integration tests yet)"

  # ── Job 5: Build Docker ──────────────────────────────────────────────────────
  docker-build:
    name: Build imagen Docker
    runs-on: ubuntu-latest
    needs: [tests, dependency-audit]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata de Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build y push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context:   .
          platforms: linux/amd64,linux/arm64
          push:      true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VERSION=2.0.0
            GIT_SHA=${{ github.sha }}

  # ── Job 6: Escaneo de contenedor (Trivy) ────────────────────────────────────
  container-scan:
    name: Escaneo de vulnerabilidades de contenedor
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Escanear imagen con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          format:       "sarif"
          output:       "trivy-results.sarif"
          severity:     "CRITICAL,HIGH"

      - name: Subir resultados Trivy a Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Job 7: Generar SBOM ──────────────────────────────────────────────────────
  sbom:
    name: Generar SBOM (Software Bill of Materials)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Generar SBOM con Syft
        uses: anchore/sbom-action@v0
        with:
          path:          .
          format:        spdx-json
          output-file:   sbom.spdx.json
          artifact-name: jeiguard-ai-sbom

      - name: Subir SBOM como artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json

  # ── Job 8: Validar Terraform ─────────────────────────────────────────────────
  terraform-validate:
    name: Validar configuraciones Terraform
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Validar Terraform AWS
        working-directory: .
        run: |
          if [ -f "main.tf" ]; then
            terraform init -backend=false
            terraform validate
          fi

      - name: Validar Terraform Azure
        working-directory: terraform/azure
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validar Terraform GCP
        working-directory: terraform/gcp
        run: |
          terraform init -backend=false
          terraform validate
