# ══════════════════════════════════════════════════════════════
# .github/workflows/ci.yml
# JeiGuard AI — Pipeline CI/CD
# Copyright (c) 2026 Jeiner Tello Nuñez
#
# Se ejecuta automáticamente en cada push y pull request.
# Valida: tipado estático (mypy) + linting (ruff) + tests (pytest)
# ══════════════════════════════════════════════════════════════

name: JeiGuard AI — CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  quality:
    name: Calidad de código
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Linting con ruff
        run: ruff check services/ shared/ tests/

      - name: Formato con ruff
        run: ruff format --check services/ shared/ tests/

      - name: Tipado estático con mypy
        run: mypy services/ shared/ --ignore-missing-imports

  tests:
    name: Tests unitarios
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ejecutar tests con cobertura
        run: |
          pytest tests/unit/ -v \
            --cov=services \
            --cov=shared \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          flags: unittests
          name: jeiguard-ai-coverage
