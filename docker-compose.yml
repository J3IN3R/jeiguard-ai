# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — JeiGuard AI (Desarrollo / Demo)
# ══════════════════════════════════════════════════════════════════════════════
# Orquesta todos los servicios del sistema JeiGuard AI en modo desarrollo.
# Para producción enterprise, usar deploy/kubernetes/
#
# Uso:
#   docker compose up -d
#   docker compose logs -f inference
#   docker compose down -v
# ══════════════════════════════════════════════════════════════════════════════

version: "3.9"

networks:
  ids_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  kafka_data:
  zookeeper_data:
  elasticsearch_data:
  grafana_data:
  model_data:

# ── Servicios de infraestructura ──────────────────────────────────────────────

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ids-zookeeper
    hostname: zookeeper
    networks: [ids_network]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ids-kafka
    hostname: kafka
    networks: [ids_network]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ids-kafka-setup
    networks: [ids_network]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic ids.raw.flows --partitions 4 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic ids.processed.features --partitions 4 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic ids.predictions --partitions 2 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic ids.alerts --partitions 2 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic ids.dead.letter --partitions 1 --replication-factor 1
      echo 'Kafka topics creados exitosamente.'
      "

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ids-elasticsearch
    hostname: elasticsearch
    networks: [ids_network]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 20s
      timeout: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: ids-kibana
    hostname: kibana
    networks: [ids_network]
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    ports:
      - "5601:5601"

  grafana:
    image: grafana/grafana:10.2.0
    container_name: ids-grafana
    hostname: grafana
    networks: [ids_network]
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ids_admin_2026
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"

# ── Servicios JeiGuard AI ──────────────────────────────────────────────────────────

  producer:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.producer
    container_name: ids-producer
    hostname: producer
    networks: [ids_network]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP:    kafka:29092
      PRODUCER_MODE:      synthetic
      FLOWS_PER_SECOND:   "1000"
      SENSOR_ID:          sensor-01
      DRY_RUN:            "false"
      LOG_LEVEL:          INFO
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  preprocessor:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.preprocessor
    container_name: ids-preprocessor
    hostname: preprocessor
    networks: [ids_network]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      SCALER_PATH:     /app/models/scaler.joblib
      DRY_RUN:         "false"
      LOG_LEVEL:       INFO
    volumes:
      - model_data:/app/models
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  inference:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.inference
    container_name: ids-inference
    hostname: inference
    networks: [ids_network]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP:       kafka:29092
      MODEL_PATH:            /app/models/
      INFERENCE_BATCH_SIZE:  "32"
      DRY_RUN:               "false"
      LOG_LEVEL:             WARNING
    volumes:
      - model_data:/app/models
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  alert-manager:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.alert_manager
    container_name: ids-alert-manager
    hostname: alert-manager
    networks: [ids_network]
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      ES_BOOTSTRAP:    http://elasticsearch:9200
      DRY_RUN:         "false"
      LOG_LEVEL:       INFO
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
